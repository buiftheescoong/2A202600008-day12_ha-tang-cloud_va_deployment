version: "3.9"

services:
  agent:
    build:
      context: ..
      dockerfile: 06-lab-complete/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=lab-secret-key-123
      - ENVIRONMENT=production
    env_file:
      - .env
    deploy:
      replicas: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agent_net

  redis:
    image: redis/redis-stack-server:latest
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - agent_net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    networks:
      - agent_net

networks:
  agent_net:
    driver: bridge
